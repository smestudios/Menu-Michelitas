<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Michelitas | Menú Digital</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Montserrat:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="overlay"></div>
    <header class="hero">
      <img src="Logo 123.png" alt="Logo Michelitas" class="logo" />
      <p class="hero__subtitle">Coctelería artesanal</p>
    </header>

    <main>
      <section id="menu-grid" class="menu-grid" aria-live="polite"></section>
    </main>

    <dialog id="admin-panel" class="admin-panel">
      <form method="dialog" class="admin-panel__header">
        <h2>Panel oculto</h2>
        <button aria-label="Cerrar">✕</button>
      </form>

      <div class="admin-layout">
        <section>
          <h3>Secciones</h3>
          <form id="section-form" class="stack">
            <label for="section-name">Nombre de sección</label>
            <input id="section-name" required placeholder="Ej. Clásicos" />
            <button type="submit">Crear sección</button>
          </form>
          <ul id="section-list" class="admin-list"></ul>
        </section>

        <section>
          <h3>Productos</h3>
          <form id="product-form" class="stack">
            <label for="product-section">Sección</label>
            <select id="product-section" required></select>

            <label for="product-name">Nombre del producto</label>
            <input id="product-name" required placeholder="Ej. Margarita" />

            <label for="product-description">Descripción</label>
            <textarea id="product-description" rows="2" placeholder="Ingredientes / preparación"></textarea>

            <label for="product-price">Precio (opcional)</label>
            <input id="product-price" placeholder="Ej. $130" />

            <button type="submit">Agregar producto</button>
          </form>
          <ul id="product-list" class="admin-list"></ul>
        </section>
      </div>
    </dialog>

    <template id="section-template">
      <article class="menu-section">
        <h2 class="menu-section__title"></h2>
        <div class="menu-products"></div>
      </article>
    </template>

    <template id="product-template">
      <article class="menu-item">
        <h3 class="menu-item__name"></h3>
        <p class="menu-item__desc"></p>
        <span class="menu-item__price"></span>
      </article>
    </template>

    <script src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>
  </body>
</html>
